# fly.toml app configuration file generated for masitaprexv2 on 2026-03-26T15:52:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'masitaprexv2'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

# UptimePulse Configuration
[env]
  # Firebase Configuration
  FIREBASE_PROJECT_ID = ""
  FIREBASE_PRIVATE_KEY = ""
  FIREBASE_CLIENT_EMAIL = ""
  FIREBASE_SERVICE_ACCOUNT = ""

  # Resend Email Configuration
  RESEND_API_KEY = ""

  # Telegram Configuration
  TELEGRAM_BOT_TOKEN = ""

  # Slack Configuration
  SLACK_WEBHOOK_URL = ""

  # Application Configuration
  HOST_URL = "https://www.masitaprex.com"
  RECAPTCHA_CLAVE_SECRETA = ""
