# fly.toml app configuration file for masitaprexv2
app = 'masitaprexv2'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # 'stop' apaga la máquina si no hay tráfico para ahorrar
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Forzamos a que solo exista una instancia en el grupo
  min_machines_running = 1
  processes = ['app']

[http_service.concurrency]
  type = 'requests'
  soft_limit = 20
  hard_limit = 25

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
