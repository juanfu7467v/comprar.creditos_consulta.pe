<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Contraseña | Consulta PE</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Variables CSS - Diseño Original */
    :root {
        --primary: #007bff; 
        --secondary: #00ff88; 
        --accent: #ff4081;
        --button-gradient: linear-gradient(135deg, #0072ff 0%, #00e676 100%);
        --bg-gradient: radial-gradient(circle at top right, #fdfbfb 0%, #ebedee 100%);
        --glass-bg: rgba(255, 255, 255, 0.9);
        --text-dark: #2c3e50;
        --text-muted: #7f8c8d;
        --shadow-3d: 0 10px 25px rgba(0, 0, 0, 0.1), 0 5px 10px rgba(0, 0, 0, 0.05);
        --border-radius: 24px;
        --input-bg: #f1f3f6;
    }

    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background: var(--bg-gradient);
        color: var(--text-dark);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
    }

    .container {
        width: 100%;
        max-width: 420px; /* Mismo ancho que el diseño original */
        margin: 20px;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-radius: var(--border-radius);
        padding: 40px 30px;
        box-shadow: var(--shadow-3d);
        border: 1px solid rgba(255, 255, 255, 0.3);
        position: relative;
        animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        z-index: 1;
        display: flex;
        flex-direction: column;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    h3 {
        font-weight: 700;
        font-size: 1.6rem;
        margin-bottom: 10px;
        text-align: center;
        background: var(--button-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    p {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.95rem;
        margin-bottom: 25px;
    }

    .input-group {
        width: 100%;
        margin-bottom: 18px;
        position: relative;
    }

    .input-field {
        width: 100%;
        padding: 16px 20px 16px 50px;
        font-size: 1rem;
        border: 2px solid transparent;
        border-radius: 16px;
        background: var(--input-bg);
        color: var(--text-dark);
        transition: all 0.3s ease;
        font-family: inherit;
    }

    .input-field:focus {
        background: #fff;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(30, 136, 229, 0.1);
        outline: none;
    }

    .field-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 20px;
        transition: color 0.3s;
    }

    .input-field:focus + .field-icon {
        color: var(--primary);
    }

    button {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 16px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
    }

    .primary-btn {
        background: var(--button-gradient);
        color: #fff;
        box-shadow: 0 8px 20px rgba(0, 114, 255, 0.3);
    }

    .primary-btn:active {
        transform: scale(0.96);
    }

    .text-link {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
    }

    .text-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        transition: opacity 0.3s;
    }
    
    .text-link a:hover {
        opacity: 0.8;
    }

    /* Mensajes Flotantes */
    .form-message-tooltip {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        width: 90%;
        max-width: 350px;
        padding: 15px 20px;
        border-radius: 15px;
        color: white;
        font-weight: 600;
        text-align: center;
        z-index: 30000;
        transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .form-message-tooltip.active { transform: translateX(-50%) translateY(0); }
    .form-message-tooltip.error { background: #ff5252; }
    .form-message-tooltip.success { background: #00e676; }

    /* Loader */
    #loading-indicator {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.8); 
        backdrop-filter: blur(5px);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }

    .circle-loader { display: flex; gap: 15px; }
    .circle-loader div {
        width: 22px; 
        height: 22px; 
        border-radius: 50%;
        background: var(--button-gradient); 
        animation: bounce 0.6s infinite alternate;
    }
    .circle-loader div:nth-child(2) { animation-delay: 0.2s; }
    .circle-loader div:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
        from { transform: translateY(0); opacity: 1; }
        to { transform: translateY(-20px); opacity: 0.7; }
    }

    /* Ajuste Móvil */
    @media (max-width: 480px) {
        .container { margin: 0; border-radius: 0; min-height: 100vh; padding: 50px 25px; justify-content: center; }
    }
  </style>
</head>
<body>

  <div id="form-message-tooltip" class="form-message-tooltip"></div>
  <div id="loading-indicator">
      <div class="circle-loader">
          <div></div>
          <div></div>
          <div></div>
      </div>
  </div>

  <div class="container">
        <h3>Recuperar Acceso</h3>
        <p>Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
        
        <div class="input-group">
            <span class="material-icons field-icon">mark_email_read</span>
            <input type="email" id="recover-email" placeholder="Tu correo registrado" class="input-field">
        </div>

        <button class="primary-btn" onclick="recoverPassword()">
            <span>Enviar enlace</span>
            <span class="material-icons">send</span>
        </button>

        <div class="text-link">
            <a href="index.html">Volver a Iniciar Sesión</a>
        </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let auth;
    let appConfig;

    // Inicialización simplificada
    async function initFirebase() {
      try {
        const response = await fetch('/api/config');
        appConfig = await response.json();
        const app = initializeApp(appConfig.firebaseConfig);
        auth = getAuth(app);
      } catch (error) {
        console.error("Error al cargar configuración:", error);
        showMessage('Error al conectar con el servidor.', 'error');
      }
    }

    initFirebase();

    const formMessageTooltip = document.getElementById('form-message-tooltip'); 
    const loadingIndicator = document.getElementById('loading-indicator'); 

    function showMessage(msg, type) {
        formMessageTooltip.textContent = msg;
        formMessageTooltip.className = `form-message-tooltip active ${type}`; 
        setTimeout(() => formMessageTooltip.classList.remove('active'), 4000);
    }

    function showLoadingOverlay() { loadingIndicator.style.display = 'flex'; }
    function hideLoadingOverlay() { loadingIndicator.style.display = 'none'; }

    // Función Única de Recuperación
    window.recoverPassword = async () => {
        const email = document.getElementById('recover-email').value;
        if (!email) {
            showMessage('Por favor ingresa tu correo.', 'error');
            return;
        }
        
        showLoadingOverlay();
        try {
            // Configuración para redirigir al usuario después de resetear (opcional)
            // const actionCodeSettings = {
            //     url: window.location.origin + '/login.html',
            //     handleCodeInApp: true
            // };

            await sendPasswordResetEmail(auth, email);
            
            hideLoadingOverlay();
            showMessage('¡Enviado! Revisa tu bandeja de entrada o spam.', 'success');
            
            // Limpiar campo
            document.getElementById('recover-email').value = '';

        } catch (error) {
            hideLoadingOverlay();
            if (error.code === 'auth/user-not-found') {
                // Por seguridad, a veces es mejor decir "Si el correo existe, se envió"
                // pero mantengo tu lógica original de feedback:
                showMessage('No existe una cuenta con este correo.', 'error');
            } else if (error.code === 'auth/invalid-email') {
                showMessage('El correo electrónico no es válido.', 'error');
            } else {
                showMessage('Error: ' + error.message, 'error');
            }
        }
    };
  </script>
</body>
</html>
