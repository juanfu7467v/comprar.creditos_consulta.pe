<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado del Sistema - PingPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .uptime-bar { height: 32px; width: 4px; border-radius: 2px; margin: 0 1px; }
        .bg-up { background-color: #10b981; }
        .bg-down { background-color: #ef4444; }
        .bg-partial { background-color: #f59e0b; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-3xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center">
                <i class="fas fa-pulse text-blue-600 text-3xl mr-3"></i>
                <h1 id="monitorName" class="text-2xl font-bold text-gray-900">Cargando...</h1>
            </div>
            <div id="statusBadge" class="px-4 py-1 rounded-full text-sm font-bold bg-gray-200 text-gray-700">
                CARGANDO
            </div>
        </div>

        <!-- Main Status Card -->
        <div class="bg-white rounded-2xl shadow-sm border p-8 mb-8">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <div class="text-sm text-gray-500 uppercase tracking-wider font-semibold">Uptime (Últimos 30 días)</div>
                    <div id="uptimePercentage" class="text-4xl font-bold text-gray-900">--%</div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-gray-500">Última comprobación</div>
                    <div id="lastCheck" class="text-gray-900 font-medium">--</div>
                </div>
            </div>

            <!-- Uptime Visualization (30 bars for 30 days) -->
            <div class="flex items-end justify-between h-12 mb-2" id="uptimeBars">
                <!-- Bars will be generated here -->
            </div>
            <div class="flex justify-between text-xs text-gray-400">
                <span>Hace 30 días</span>
                <span>Hoy</span>
            </div>
        </div>

        <!-- Incidents / History -->
        <h2 class="text-lg font-bold text-gray-900 mb-4">Historial de Incidencias</h2>
        <div id="incidentsList" class="space-y-4">
            <!-- Incidents will be listed here -->
            <div class="bg-white rounded-xl border p-6 text-center text-gray-500">
                No se han detectado incidencias en los últimos 30 días. ¡Todo funciona correctamente!
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-12 pt-8 border-t text-center">
            <p class="text-sm text-gray-400">Monitoreado por <span class="font-bold text-blue-600">PingPulse</span></p>
            <a href="/pingpulse-dashboard.html" class="text-xs text-gray-400 hover:text-gray-600 mt-2 inline-block">Panel de Control</a>
        </div>
    </div>

    <script>
        // Mock data for the status page
        const monitorData = {
            name: "API Masitaprex",
            status: "up",
            uptime: 99.98,
            lastCheck: "Hace 2 minutos",
            history: Array.from({ length: 30 }, (_, i) => ({
                day: 30 - i,
                status: i === 5 ? 'down' : (i === 12 ? 'partial' : 'up')
            }))
        };

        function initPage() {
            document.getElementById('monitorName').innerText = monitorData.name;
            document.getElementById('uptimePercentage').innerText = monitorData.uptime + '%';
            document.getElementById('lastCheck').innerText = monitorData.lastCheck;
            
            const badge = document.getElementById('statusBadge');
            if (monitorData.status === 'up') {
                badge.innerText = 'OPERATIVO';
                badge.className = 'px-4 py-1 rounded-full text-sm font-bold bg-emerald-100 text-emerald-700';
            } else {
                badge.innerText = 'CAÍDO';
                badge.className = 'px-4 py-1 rounded-full text-sm font-bold bg-rose-100 text-rose-700';
            }

            const barsContainer = document.getElementById('uptimeBars');
            barsContainer.innerHTML = monitorData.history.map(day => `
                <div class="uptime-bar bg-${day.status}" title="Día ${day.day}: ${day.status === 'up' ? '100% Uptime' : (day.status === 'down' ? 'Caída detectada' : 'Problemas menores')}"></div>
            `).join('');
        }

        // Simulate loading
        setTimeout(initPage, 500);
    </script>
</body>
</html>
