<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de Correo | Masitaprex</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
        --primary: #007bff; 
        --button-gradient: linear-gradient(135deg, #0072ff 0%, #00e676 100%);
        --bg-gradient: radial-gradient(circle at top right, #fdfbfb 0%, #ebedee 100%);
    }
    body {
        font-family: 'Poppins', sans-serif;
        background: var(--bg-gradient);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .card {
        background: white;
        padding: 40px;
        border-radius: 30px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        text-align: center;
    }
    .primary-btn {
        width: 100%;
        height: 58px;
        background: var(--button-gradient);
        color: #fff;
        border: none;
        border-radius: 22px;
        font-size: 1.1rem;
        font-weight: 600;
        margin-top: 20px;
        box-shadow: 0 12px 24px -6px rgba(0, 114, 255, 0.4);
        transition: all 0.3s ease;
        cursor: pointer;
    }
    .primary-btn:disabled {
        background: #e2e8f0;
        color: #94a3b8;
        box-shadow: none;
        cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mb-6">
        <span class="material-icons text-7xl text-blue-500">mark_email_unread</span>
    </div>
    <h2 class="text-3xl font-extrabold mb-4 text-slate-800">Verifica tu correo</h2>
    <p class="text-slate-600 mb-6">
        Hemos enviado un enlace de verificación a tu bandeja de entrada. Por favor, revisa tu correo para activar tu cuenta.
    </p>
    
    <div id="timer-text" class="text-sm font-medium text-slate-500 mb-2">
        Puedes reenviar el correo en <span id="seconds">50</span> segundos
    </div>
    
    <button id="resend-btn" class="primary-btn" disabled onclick="resendVerification()">
        Reenviar correo de verificación
    </button>
    
    <div class="mt-8">
        <a href="login.html" class="text-blue-600 font-semibold flex items-center justify-center gap-2">
            <span class="material-icons text-sm">arrow_back</span> Volver al inicio
        </a>
    </div>
  </div>

  <div id="form-message-tooltip" class="fixed top-6 left-1/2 -translate-x-1/2 z-[30000] px-6 py-4 rounded-2xl shadow-2xl transition-all duration-500 -translate-y-32 text-white font-medium flex items-center gap-3"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    let auth;
    const resendBtn = document.getElementById('resend-btn');
    const secondsSpan = document.getElementById('seconds');
    const timerText = document.getElementById('timer-text');
    const formMessageTooltip = document.getElementById('form-message-tooltip');

    function showMessage(msg, type) {
        formMessageTooltip.textContent = msg;
        formMessageTooltip.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
        formMessageTooltip.classList.remove('-translate-y-32');
        formMessageTooltip.classList.add('translate-y-0');
        setTimeout(() => {
            formMessageTooltip.classList.remove('translate-y-0');
            formMessageTooltip.classList.add('-translate-y-32');
        }, 4000);
    }

    async function initFirebase() {
        try {
            const response = await fetch('/api/config');
            const appConfig = await response.json();
            const app = initializeApp(appConfig.firebaseConfig);
            auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    user.reload().then(() => {
                        if (user.emailVerified) {
                            window.location.href = "actividad";
                        }
                    });
                }
            });
        } catch (error) {
            console.error("Error:", error);
        }
    }

    initFirebase();

    let timeLeft = 50;
    const timer = setInterval(() => {
        timeLeft--;
        secondsSpan.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            resendBtn.disabled = false;
            timerText.style.display = 'none';
        }
    }, 1000);

    window.resendVerification = async () => {
        if (!auth.currentUser) {
            showMessage("No se detectó una sesión activa. Inicia sesión de nuevo.", "error");
            return;
        }
        try {
            await sendEmailVerification(auth.currentUser);
            showMessage("Correo de verificación reenviado", "success");
            resendBtn.disabled = true;
            timeLeft = 50;
            timerText.style.display = 'block';
            secondsSpan.textContent = timeLeft;
            const newTimer = setInterval(() => {
                timeLeft--;
                secondsSpan.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(newTimer);
                    resendBtn.disabled = false;
                    timerText.style.display = 'none';
                }
            }, 1000);
        } catch (error) {
            showMessage("Error al reenviar: " + error.message, "error");
        }
    };
  </script>
</body>
</html>
