app = "pingpulse-worker"
primary_region = "mia"

[build]
  image = "node:20-slim"

[env]
  NODE_ENV = "production"
  # Firebase Configuration
  FIREBASE_PROJECT_ID = ""
  FIREBASE_PRIVATE_KEY = ""
  FIREBASE_CLIENT_EMAIL = ""
  FIREBASE_SERVICE_ACCOUNT = ""
  # Resend Email Configuration
  RESEND_API_KEY = ""
  # Telegram Configuration
  TELEGRAM_BOT_TOKEN = ""
  # Slack Configuration
  SLACK_WEBHOOK_URL = ""

[processes]
  worker = "node pingpulse/worker/monitor.js"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"
