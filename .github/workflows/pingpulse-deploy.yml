name: PingPulse Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'pingpulse/**'
      - '.github/workflows/pingpulse-deploy.yml'

jobs:
  deploy-worker:
    name: Deploy PingPulse Worker to Fly.io
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter (if available)
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Install Fly CLI
        run: curl -L https://fly.io/install.sh | sh
      
      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          /home/runner/.fly/bin/flyctl deploy --config pingpulse/worker/fly.toml
        continue-on-error: true
      
      - name: Notify deployment status
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"

  deploy-api:
    name: Deploy PingPulse API
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build API
        run: npm run build --if-present
        continue-on-error: true
      
      - name: Run tests
        run: npm test --if-present
        continue-on-error: true
      
      - name: Notify completion
        run: echo "API deployment pipeline completed"
